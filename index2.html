<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lukeflix V19 - Drive Fix</title>
    <style>
        :root { --primary: #ffcc00; --bg: #0a0a0a; --card: #161616; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { background: #000; padding: 15px 5%; display: flex; align-items: center; border-bottom: 2px solid var(--primary); gap: 20px; position: sticky; top: 0; z-index: 1000; }
        .logo { color: var(--primary); font-size: 26px; font-weight: bold; cursor: pointer; }
        nav { display: flex; gap: 15px; }
        nav span { cursor: pointer; font-weight: bold; opacity: 0.6; font-size: 13px; text-transform: uppercase; }
        nav span.active { opacity: 1; color: var(--primary); border-bottom: 2px solid var(--primary); }
        .search-container { flex-grow: 1; max-width: 300px; margin-left: auto; }
        .search-container input { width: 100%; padding: 10px 15px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; }
        .btn { background: var(--primary); color: #000; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .admin-only { display: none; } 
        #admin-lock { background: none; border: none; cursor: pointer; font-size: 20px; color: #222; }
        .container { padding: 30px 5%; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #222; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card img { width: 100%; height: 270px; object-fit: cover; }
        .card-info { padding: 12px; text-align: center; font-weight: bold; }
        .view { display: none; padding: 20px 5%; }
        .view.active { display: block; }
        .form-box { background: #111; padding: 30px; border-radius: 12px; max-width: 500px; margin: 20px auto; border: 1px solid #333; }
        label { display: block; margin-top: 10px; font-size: 11px; color: var(--primary); font-weight: bold; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        .player-container { max-width: 1000px; margin: 0 auto; text-align: center; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 10px; border: 1px solid var(--primary); overflow: hidden; }
        iframe, video { width: 100%; height: 100%; border: none; }
        .ep-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 15px; }
        .ep-btn { background: #222; color: white; border: 1px solid #444; padding: 10px 15px; cursor: pointer; border-radius: 5px; }
        .ep-btn:hover { background: var(--primary); color: #000; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="location.reload()">LUKEFLIX</div>
    <nav>
        <span id="tab-filmes" class="active" onclick="changeTab('filmes')">Filmes</span>
        <span id="tab-series" onclick="changeTab('series')">Séries</span>
        <span id="tab-animes" onclick="changeTab('animes')">Animes</span>
    </nav>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Pesquisar..." oninput="search()">
    </div>
    <button class="btn admin-only" onclick="showView('upload-view')">+ UPLOAD</button>
    <button id="admin-lock" onclick="loginAdmin()">🔒</button>
</header>

<div id="gallery-view" class="view active">
    <div class="container"><h2 id="view-title">FILMES</h2><div class="video-grid" id="mainGrid"></div></div>
</div>

<div id="upload-view" class="view">
    <div class="form-box">
        <h2 style="color:var(--primary); text-align:center; margin:0;">UPLOAD CLOUD</h2>
        <label>Tipo</label>
        <select id="typeSelect"><option value="filmes">Filme</option><option value="series">Série</option><option value="animes">Anime</option></select>
        <input type="text" id="title" placeholder="Título">
        <textarea id="desc" placeholder="Sinopse..." rows="2"></textarea>
        <label>Link da Capa (URL)</label>
        <input type="text" id="coverUrl" placeholder="https://site.com/foto.jpg">
        <label>Links dos Vídeos (Use o formato /preview do Drive)</label>
        <textarea id="videoLinks" placeholder="Um link por linha..." rows="5"></textarea>
        <button class="btn" style="width:100%; margin-top:15px;" onclick="save()">PUBLICAR NO SITE</button>
        <button class="btn" style="width:100%; background:#222; color:white; margin-top:10px;" onclick="changeTab(currentCat)">CANCELAR</button>
    </div>
</div>

<div id="player-view" class="view">
    <div class="player-container">
        <button class="btn" onclick="changeTab(currentCat)" style="margin-bottom:20px;">⬅ VOLTAR</button>
        <div class="video-box" id="video-wrapper"></div>
        <h1 id="p-title" style="color:var(--primary); margin:20px 0 10px;"></h1>
        <p id="p-desc" style="color:#aaa;"></p>
        <div id="ep-container" class="ep-list"></div>
        <button id="delBtn" class="btn admin-only" style="background:#ff4444; color:white; margin-top:40px; width:100%;">🗑 ELIMINAR</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('lukeflix_db')) || { filmes: [], series: [], animes: [] };
    let currentCat = 'filmes';
    let isAdmin = false;
    const MASTER_PASS = "Angola-zango-icolebengo-1234-14-gg-jj-jjk-jjs-itamar-sario";

    function stopVideo() { document.getElementById('video-wrapper').innerHTML = ""; }

    function loginAdmin() {
        if(prompt("Chave Mestre:") === MASTER_PASS) {
            isAdmin = true;
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            document.getElementById('admin-lock').innerHTML = "🔓";
            alert("Administrador Ativo!");
        }
    }

    function changeTab(cat) {
        stopVideo();
        currentCat = cat;
        document.querySelectorAll('nav span').forEach(s => s.classList.remove('active'));
        document.getElementById('tab-' + cat).classList.add('active');
        document.getElementById('view-title').innerText = cat;
        showView('gallery-view');
        render();
    }

    function showView(id) {
        if(id !== 'player-view') stopVideo();
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function save() {
        if(!isAdmin) return;
        const title = document.getElementById('title').value;
        const cover = document.getElementById('coverUrl').value;
        const links = document.getElementById('videoLinks').value.split('\n').filter(l => l.trim() !== "");
        if(!title || !cover || links.length === 0) return alert("Preencha tudo!");

        const item = { id: Date.now(), title, desc: document.getElementById('desc').value, cover, videos: links };
        db[document.getElementById('typeSelect').value].push(item);
        localStorage.setItem('lukeflix_db', JSON.stringify(db));
        changeTab(document.getElementById('typeSelect').value);
    }

    function render(data = null) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        (data || db[currentCat]).forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openPlayer(item);
            card.innerHTML = `<img src="${item.cover}"><div class="card-info">${item.title}</div>`;
            grid.appendChild(card);
        });
    }

    function openPlayer(item) {
        showView('player-view');
        document.getElementById('p-title').innerText = item.title;
        document.getElementById('p-desc').innerText = item.desc;
        const wrapper = document.getElementById('video-wrapper');
        const epContainer = document.getElementById('ep-container');
        epContainer.innerHTML = '';

        const playLink = (url) => {
            url = url.trim();
            // Se for link do Drive, usa o Iframe (Independente se termina em /view ou /preview)
            if (url.includes('drive.google.com')) {
                let driveUrl = url.replace('/view', '/preview').replace('usp=drive_link', '');
                wrapper.innerHTML = `<iframe src="${driveUrl}" allow="autoplay" allowfullscreen></iframe>`;
            } 
            else if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
                wrapper.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allowfullscreen></iframe>`;
            } else {
                wrapper.innerHTML = `<video src="${url}" controls autoplay></video>`;
            }
        };

        if(item.videos.length > 1) {
            item.videos.forEach((l, i) => {
                const b = document.createElement('button');
                b.className = 'ep-btn';
                b.innerText = "EP " + (i+1);
                b.onclick = () => playLink(l);
                epContainer.appendChild(b);
            });
        }
        playLink(item.videos[0]);

        const delBtn = document.getElementById('delBtn');
        const newDelBtn = delBtn.cloneNode(true);
        delBtn.parentNode.replaceChild(newDelBtn, delBtn);
        if(isAdmin) newDelBtn.style.display = 'block';
        newDelBtn.onclick = () => {
            if(confirm("Eliminar?")) {
                db[currentCat] = db[currentCat].filter(obj => obj.id !== item.id);
                localStorage.setItem('lukeflix_db', JSON.stringify(db));
                changeTab(currentCat);
            }
        };
    }

    function search() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        render(db[currentCat].filter(i => i.title.toLowerCase().includes(q)));
    }
    render();
</script>
</body>
</html>
